name: music_app
description: A premium music streaming application built with Flutter.
publish_to: 'none'
version: 2.3.32+42

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.4.1

  # State Management

  # Navigation
  go_router: ^13.0.0

  # Utils
  equatable: ^2.0.5
  intl: ^0.19.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  flutter_riverpod: ^3.3.1
  google_sign_in: ^7.2.0
  dio: ^5.9.2
  youtube_explode_dart: ^3.0.5
  ffmpeg_kit_min_gpl: ^6.0.3+2-LTS
  video_player: ^2.11.1
  chewie: ^1.13.1
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  shared_preferences: ^2.5.5
  palette_generator: ^0.3.3+7
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  ota_update: ^7.1.0
  supabase_flutter: ^2.8.3
  path_provider: ^2.1.5
  file_picker: ^10.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.5

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/somax_logo.png"
  min_sdk_android: 21 # android min sdk version



flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

